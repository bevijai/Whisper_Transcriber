<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Whisper Local — Transcriber</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <main class="container">
      <header class="header">
        <div class="brand" aria-label="Edzy brand">
          <div class="logo-wrap">
            <img class="logo default" src="/static/assets/logo-default.svg" alt="Edzy logo" />
            <img class="logo hover" src="/static/assets/logo-hover.svg" alt="Edzy logo hover" />
          </div>
          <div class="brand-text">
            <h1>Edzy — Whisper Transcriber</h1>
            <p class="lead">Record or upload audio, transcribe or translate with studio-quality results.</p>
          </div>
        </div>
      </header>

      <section class="controls">
        <div class="row">
          <div class="col">
            <label class="label">Model</label>
            <select id="modelSelect">
              <option value="tiny">tiny</option>
              <option value="base">base</option>
              <option value="small">small</option>
              <option value="medium">medium</option>
              <option value="large">large</option>
            </select>
          </div>

          <div class="col">
            <label class="label">Mode</label>
            <select id="modeSelect">
              <option value="en_en">Transcribe (English → English)</option>
              <option value="lang_lang">Transcribe (Same language)</option>
              <option value="en_to_lang">Translate (English → Other)</option>
              <option value="lang_to_en">Translate (Other → English)</option>
            </select>
          </div>

          <div class="col">
            <label class="label">Source</label>
            <select id="srcLangSelect">
              <option value="auto">Detect language</option>
            </select>
          </div>

          <div class="col">
            <label class="label">Target</label>
            <select id="tgtLangSelect">
              <option value="en">English</option>
            </select>
          </div>
        </div>

        <div class="row">
          <div>
            <label class="label">Audio</label>
            <input id="fileInput" type="file" accept="audio/*" />
          </div>
        </div>

        <div class="row actions">
          <button id="recordBtn" class="btn secondary">Start Recording</button>
          <button id="transcribeBtn" class="btn primary">Transcribe</button>
        </div>

        <div id="status" class="status">Idle</div>
      </section>

      <section class="result">
        <h2>Transcription</h2>
        <textarea id="transcript" readonly placeholder="Transcription will appear here..."></textarea>
        <div class="row result-actions">
          <button id="copyBtn" class="btn small">Copy</button>
          <button id="downloadBtn" class="btn small">Download</button>
        </div>
      </section>

      <footer class="footer">
        <small>Served from your local machine — data does not leave your host.</small>
      </footer>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
